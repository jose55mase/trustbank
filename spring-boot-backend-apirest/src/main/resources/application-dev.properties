# Perfil de desarrollo - Base de datos H2 en memoria
server.ssl.enabled=false

# H2 Database (en memoria, se reinicia cada vez que arrancas)
spring.datasource.url=jdbc:h2:mem:guardianstrustbank;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA / Hibernate - Hibernate crea las tablas desde las entidades
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true

# Desactivar schema.sql y data.sql automáticos (incompatibles con H2)
spring.datasource.initialization-mode=never

# Consola H2 (accesible en http://localhost:8081/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
