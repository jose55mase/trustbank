server.port=9090
spring.application.name=bank

# ===== Database config moved to profile-specific files =====
# Use: mvn spring-boot:run -Dspring-boot.run.profiles=dev (H2 in-memory)
# Or:  mvn spring-boot:run -Dspring-boot.run.profiles=prod (MySQL)
# Default profile: dev
spring.profiles.active=dev

spring.jpa.hibernate.ddl-auto=update
logging.level.org.hibernate.SQL=debug

spring.jackson.time-zone=America/Santiago
spring.jackson.locale=es_CL

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

