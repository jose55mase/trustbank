# Active profile — loads application-local.properties for local dev
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# Discord Bot Configuration
discord.bot.token=${DISCORD_BOT_TOKEN:}
discord.bot.default-channel-id=${DISCORD_DEFAULT_CHANNEL_ID:}
discord.bot.log-prefix=${DISCORD_LOG_PREFIX:discord-bot}
discord.bot.max-reconnect-attempts=${DISCORD_MAX_RECONNECT_ATTEMPTS:5}

# Nitrado API Configuration
nitrado.api-token=${NITRADO_API_TOKEN:}
nitrado.base-url=${NITRADO_BASE_URL:https://api.nitrado.net}
nitrado.connect-timeout-ms=${NITRADO_CONNECT_TIMEOUT_MS:10000}
nitrado.read-timeout-ms=${NITRADO_READ_TIMEOUT_MS:10000}

# Database - H2 (default for dev/local)
spring.datasource.url=jdbc:h2:file:./data/economy-dev
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true

# Economy Scheduler Configuration
economy.nitrado.service-id=${ECONOMY_NITRADO_SERVICE_ID:0}
economy.guild-id=${ECONOMY_GUILD_ID:}

# Spring Boot Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
