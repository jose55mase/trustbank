# ===========================================
# PRODUCTION CONFIGURATION - MySQL
# ===========================================

# MySQL Database
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:dayz_economy}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false

# Disable H2 console in production
spring.h2.console.enabled=false

# Nitrado API
nitrado.api-token=${NITRADO_API_TOKEN}
nitrado.game-server-folder-id=${NITRADO_FOLDER_ID}

# Economy
economy.nitrado.service-id=${NITRADO_SERVICE_ID}
economy.guild-id=${DISCORD_GUILD_ID}

# Shop
shop.nitrado.service-id=${NITRADO_SERVICE_ID}
shop.nitrado.gameplay-path=${SHOP_GAMEPLAY_PATH:/dayzOffline.enoch/cfggameplay.json}
shop.nitrado.custom-folder=${SHOP_CUSTOM_FOLDER:/dayzOffline.enoch/custom}

# Discord Bot
discord.bot.token=${DISCORD_BOT_TOKEN}
